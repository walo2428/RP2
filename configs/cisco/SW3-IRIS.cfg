! Configuration SW3-IRIS - Projet RP-03 IRIS Nice
! Switch Cisco Catalyst 2960-S
! BTS SIO SISR - Mai 2026
!
hostname SW3-IRIS
!
no ip domain-lookup
ip domain-name iris.local
!
clock timezone CET 1 0
clock summer-time CEST recurring
service timestamps log datetime msec
spanning-tree mode pvst
spanning-tree extend system-id
dot1x system-auth-control
!
! --- VLANs ---
vlan 10
 name IRIS_Etudiants
vlan 20
 name Profs
vlan 30
 name Administration
vlan 40
 name Guest
vlan 50
 name Management
vlan 99
 name PRE_AUTH
!
! --- Interface de management ---
interface Vlan1
 no ip address
 shutdown
!
interface Vlan50
 ip address 192.168.50.253 255.255.255.0
!
ip default-gateway 192.168.50.254
!
! --- Uplink vers le routeur (trunk) ---
interface GigabitEthernet2/0/1
 description --- UPLINK_VERS_ROUTEUR ---
 switchport trunk allowed vlan 10,20,30,40,50,99
 switchport mode trunk
 no shutdown
!
! --- Ports management infrastructure ---
interface range GigabitEthernet2/0/2 - 11
 description --- ACCES_MANAGEMENT_INFRA ---
 switchport access vlan 50
 switchport mode access
 spanning-tree portfast
 no shutdown
!
! --- Ports utilisateurs avec 802.1X ---
interface range GigabitEthernet2/0/12 - 48
 description ZONE_UTILISATEURS_DYNAMIQUE
 switchport access vlan 99
 switchport mode access
 authentication port-control auto
 authentication violation protect
 dot1x pae authenticator
 dot1x timeout tx-period 10
 spanning-tree portfast
 no shutdown
!
! --- AAA / RADIUS ---
aaa new-model
aaa authentication dot1x default group radius
aaa authorization network default group radius
aaa session-id common
!
! --- SNMP ---
snmp-server community iris-nice RO
snmp-server host 192.168.50.20 version 2c iris-nice
snmp-server contact Admin-IRIS
!
! --- Syslog ---
logging host 192.168.50.20
logging source-interface Vlan50
!
! --- Acces distant SSH uniquement ---
line vty 0 15
 transport input ssh
!
end
