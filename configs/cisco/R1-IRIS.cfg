! Configuration R1-IRIS - Projet RP-03 IRIS Nice
! Routeur Cisco 1941W
! BTS SIO SISR - Mai 2026
!
hostname R1-IRIS
!
no ip domain-lookup
ip domain-name iris.local
service timestamps log datetime msec
!
interface GigabitEthernet0/1
 description --- LIAISON_INTERNET ---
 ip address dhcp
 ip nat outside
 no shutdown
!
interface GigabitEthernet0/0
 description --- TRUNK_VERS_SW3-IRIS ---
 no ip address
 no shutdown
!
interface GigabitEthernet0/0.10
 encapsulation dot1Q 10
 ip address 192.168.10.254 255.255.255.0
 ip helper-address 192.168.50.20
 ip nat inside
 ip access-group ACL_VLAN10 in
!
interface GigabitEthernet0/0.20
 encapsulation dot1Q 20
 ip address 192.168.20.254 255.255.255.0
 ip helper-address 192.168.50.20
 ip nat inside
 ip access-group ACL_VLAN20 in
!
interface GigabitEthernet0/0.30
 encapsulation dot1Q 30
 ip address 192.168.30.254 255.255.255.0
 ip helper-address 192.168.50.20
 ip nat inside
!
interface GigabitEthernet0/0.40
 encapsulation dot1Q 40
 ip address 192.168.40.254 255.255.255.0
 ip helper-address 192.168.50.20
 ip nat inside
 ip access-group ACL_VLAN40 in
!
interface GigabitEthernet0/0.50
 encapsulation dot1Q 50
 ip address 192.168.50.254 255.255.255.0
 ip nat inside
!
interface GigabitEthernet0/0.99
 encapsulation dot1Q 99
 ip address 192.168.99.254 255.255.255.0
 ip helper-address 192.168.50.20
 ip nat inside
!
ip nat inside source list NAT_ACL interface GigabitEthernet0/1 overload
!
ip access-list standard NAT_ACL
 permit 192.168.10.0 0.0.0.255
 permit 192.168.20.0 0.0.0.255
 permit 192.168.30.0 0.0.0.255
 permit 192.168.40.0 0.0.0.255
 permit 192.168.50.0 0.0.0.255
 permit 192.168.99.0 0.0.0.255
!
ip access-list extended ACL_VLAN10
 permit tcp 192.168.10.0 0.0.0.255 host 192.168.50.20 eq 443
 permit tcp 192.168.10.0 0.0.0.255 host 192.168.50.20 eq 80
 permit udp 192.168.10.0 0.0.0.255 host 192.168.50.20 eq 53
 permit udp 192.168.10.0 0.0.0.255 host 192.168.50.20 eq 67
 deny   ip 192.168.10.0 0.0.0.255 192.168.50.0 0.0.0.255
 permit ip 192.168.10.0 0.0.0.255 any
!
ip access-list extended ACL_VLAN20
 permit tcp 192.168.20.0 0.0.0.255 host 192.168.50.20 eq 443
 permit tcp 192.168.20.0 0.0.0.255 host 192.168.50.20 eq 80
 permit udp 192.168.20.0 0.0.0.255 host 192.168.50.20 eq 53
 permit udp 192.168.20.0 0.0.0.255 host 192.168.50.20 eq 67
 deny   ip 192.168.20.0 0.0.0.255 192.168.50.0 0.0.0.255
 permit ip 192.168.20.0 0.0.0.255 any
!
ip access-list extended ACL_VLAN40
 deny   ip 192.168.40.0 0.0.0.255 192.168.10.0 0.0.0.255
 deny   ip 192.168.40.0 0.0.0.255 192.168.20.0 0.0.0.255
 deny   ip 192.168.40.0 0.0.0.255 192.168.30.0 0.0.0.255
 deny   ip 192.168.40.0 0.0.0.255 192.168.50.0 0.0.0.255
 permit ip 192.168.40.0 0.0.0.255 any
!
snmp-server community iris-nice RO
snmp-server host 192.168.50.20 version 2c iris-nice
!
logging host 192.168.50.20
logging source-interface GigabitEthernet0/0.50
logging trap informational
!
line vty 0 4
 transport input ssh
!
end
