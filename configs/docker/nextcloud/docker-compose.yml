services:
  postgres-nextcloud:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_DB: nextcloud_db
      POSTGRES_USER: nextcloud_user
      POSTGRES_PASSWORD: ${NC_DB_PASSWORD}
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data
    networks:
      - nextcloud-network
    restart: unless-stopped

  nextcloud:
    image: nextcloud:28
    ports:
      - "8080:80"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres-nextcloud
      POSTGRES_DB: nextcloud_db
      POSTGRES_USER: nextcloud_user
      POSTGRES_PASSWORD: ${NC_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: cloud.iris-nice.lan 192.168.50.20
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://cloud.iris-nice.lan
    volumes:
      - ./volumes/nextcloud-data:/var/www/html
    networks:
      - nextcloud-network
      - traefik-network
      - ldap-network
    depends_on:
      - postgres-nextcloud
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`cloud.iris-nice.lan`)"
      - "traefik.http.routers.nextcloud.tls=true"
      - "traefik.http.routers.nextcloud.middlewares=security-headers@file"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"

  phpldapadmin:
    image: osixia/phpldapadmin:latest
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    networks:
      - nextcloud-network
      - traefik-network
      - ldap-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpldapadmin.rule=Host(`ldap.iris-nice.lan`)"
      - "traefik.http.routers.phpldapadmin.tls=true"
      - "traefik.http.routers.phpldapadmin.middlewares=security-headers@file"
      - "traefik.http.services.phpldapadmin.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"

networks:
  nextcloud-network:
  traefik-network:
    external: true
  ldap-network:
    name: ldap-network
    external: true
