[[servers]]
host = "openldap"
port = 389
use_ssl = false
start_tls = false
bind_dn = "cn=admin,dc=iris-nice,dc=lan"
bind_password = "LDAP_ADMIN_PASSWORD"
search_filter = "(uid=%s)"
search_base_dns = ["ou=Users,dc=iris-nice,dc=lan"]

[servers.attributes]
name = "cn"
surname = "sn"
username = "uid"
member_of = "memberOf"
email = "mail"

[[servers.group_mappings]]
group_dn = "cn=Admins,ou=Groups,dc=iris-nice,dc=lan"
org_role = "Admin"

[[servers.group_mappings]]
group_dn = "cn=Profs,ou=Groups,dc=iris-nice,dc=lan"
org_role = "Editor"

[[servers.group_mappings]]
group_dn = "cn=Etudiants,ou=Groups,dc=iris-nice,dc=lan"
org_role = "Viewer"
